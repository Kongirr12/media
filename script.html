<script>
    /**
     * SCRIPT.HTML - Client Side Logic (Manual Search & Clear Button)
     * -------------------------------------------------------------------------
     * Features:
     * - [CORE] Server-side Pagination: Fetches data per page via google.script.run
     * - [CORE] Dynamic Pagination UI: Renders Next/Prev/Page numbers
     * - [UPDATE] Manual Search Trigger: Search only on Enter key or Button click

     * - [FIX] Initial Load: Respects Server Settings (Cell B3) for Page Limit

     * - Dynamic Dropzone UI: Hide upload prompt when filled.
     * - Event Stop Propagation: Fix delete button triggering file upload.
     * - Role-Based Access Control: User restricts (Own data only, No delete).
     * -------------------------------------------------------------------------
     */

    // 1. CONSTANTS & STATE
    // =========================================================================

    var IMG_PLACEHOLDER_COVER = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iMjAwIiB2aWV3Qm94PSIwIDAgNDAwIDIwMCI+PHJlY3Qgd2lkdGg9IjQwMCIgaGVpZ2h0PSIyMDAiIGZpbGw9IiNlOWVjZWYiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjAiIGZpbGw9IiM2Yzc1N2QiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiPk5vIENvdmVyPC90ZXh0Pjwvc3ZnPg==";
    var IMG_PLACEHOLDER_USER = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzNSIgaGVpZ2h0PSIzNSIgdmlld0JveD0iMCAwIDM1IDM1Ij48cmVjdCB3aWR0aD0iMzUiIGhlaWdodD0iMzUiIGZpbGw9IiNlOWVjZWYiLz48cGF0aCBkPSJNMTKr6EeffXNDX9kzYZyr5KsyfSB1v9GuZYx1IDQuNSA0LjVzLTIuMDE1IDQuNS00LjUgNC41LTQuNS0yLjAxNS00LjUtNC41IDIuMDE1LTQuNSA0LjUtNC41em0wIDljNC45NyAwIDkgNC4wMyA5IDl2MS41aC0xOHYtMS41YzAtNC45NyA0LjAzLTkgOS05eiIgZmlsbD0iIzZjNzU3ZCIvPjwvc3ZnPg==";
    var IMG_PLACEHOLDER_THUMB = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDUwIDQwIj48cmVjdCB3aWR0aD0iNTAiIGhlaWdodD0iNDAiIGZpbGw9IiNlOWVjZWYiLz48L3N2Zz4=";

    // Data Store
    var allData = { resources: [], users: [], favorites: [], subjects: [], grades: [], types: [], settings: {} };
    var currentUser = null;

    // File Upload State
    var addFormFiles = { cover: null, album: [] };
    var editFormFiles = { cover: null, album: [] };
    var filesToDelete = { cover: false, album: [] };

    // Pagination State
    var currentPage = 1;
    var totalPages = 1;
    var totalItems = 0;
    var itemsPerPage = 20; // Default fallback, will be updated by Settings
    var isFetching = false;

    // =========================================================================
    // 2. CORE UTILITIES & HELPERS
    // =========================================================================

    function showLoader(isLoading, text) {
        var loader = document.getElementById('loader-overlay');
        if (loader) {
            loader.style.display = isLoading ? 'flex' : 'none';
            var p = loader.querySelector('p');
            if (p) p.innerText = text || 'กำลังโหลดข้อมูล...';
        }
    }

    window.handleMediaError = function (imgElement, fileId) {
        imgElement.onerror = null;
        imgElement.style.display = 'none';
        var iframe = document.createElement('iframe');
        iframe.src = "https://drive.google.com/file/d/" + fileId + "/preview";
        iframe.className = "d-block w-100 h-100 border-0";
        iframe.setAttribute('allow', 'autoplay');
        imgElement.parentElement.appendChild(iframe);
    };

    function sanitizeId(str) { return String(str).replace(/[^a-zA-Z0-9ก-๙]/g, '_'); }

    function getUserName(userId) {
        if (!userId) return '-';
        var user = (allData.users || []).find(function (u) { return String(u.id) === String(userId) || String(u.username) === String(userId); });
        return user ? user.name : userId;
    }

    function normalizeData(arr) {
        if (!Array.isArray(arr)) return [];
        return arr.map(function (item) {
            var newItem = {};
            for (var key in item) newItem[key.toString().trim().toLowerCase().replace(/\s+/g, '_')] = item[key];
            return newItem;
        });
    }

    function getFileIcon(mimeType, fileName) {
        if (!mimeType) mimeType = '';
        if (mimeType.startsWith('image/')) return 'fa-image text-primary';
        if (mimeType.startsWith('video/')) return 'fa-file-video text-danger';
        if (mimeType === 'application/pdf') return 'fa-file-pdf text-danger';
        if (fileName && fileName.match(/\.(doc|docx)$/i)) return 'fa-file-word text-primary';
        if (fileName && fileName.match(/\.(xls|xlsx)$/i)) return 'fa-file-excel text-success';
        if (fileName && fileName.match(/\.(ppt|pptx)$/i)) return 'fa-file-powerpoint text-warning';
        return 'fa-file text-secondary';
    }

    function parseAlbumData(data) {
        if (!data) return [];
        try {
            var parsed = (typeof data === 'string' && (data.startsWith('[') || data.startsWith('{'))) ? JSON.parse(data) : data;
            if (Array.isArray(parsed)) {
                return parsed.map(function (item) {
                    if (typeof item === 'object' && item !== null && item.id) return item;
                    if (typeof item === 'string' && item.trim() !== "") return { id: item.trim(), type: 'image/jpeg', name: 'Legacy File' };
                    return null;
                }).filter(function (x) { return x !== null; });
            } else if (typeof data === 'string' && data.includes(',')) {
                return data.split(',').map(function (s) { return { id: s.trim(), type: 'image/jpeg', name: 'Legacy File' }; });
            }
            return [];
        } catch (e) { console.error("Parse Error:", e); return []; }
    }

    function populateDropdown(elementId, list, isFilter) {
        var select = document.getElementById(elementId);
        if (!select) return;
        select.innerHTML = isFilter ? '<option value="">ทั้งหมด</option>' : '<option value="" disabled selected>เลือก...</option>';
        if (list && Array.isArray(list)) {
            list.forEach(function (item) {
                if (item) {
                    var option = document.createElement('option');
                    option.value = item; option.textContent = item; select.appendChild(option);
                }
            });
        }
    }

    function populateCheckboxes(containerId, list, inputName) {
        var container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        if (list && Array.isArray(list)) {
            list.forEach(function (item) {
                if (item) {
                    var div = document.createElement('div'); div.className = 'form-check';
                    var id = containerId + '_chk_' + sanitizeId(item);
                    div.innerHTML = '<input class="form-check-input" type="checkbox" name="' + inputName + '" value="' + item + '" id="' + id + '"><label class="form-check-label" for="' + id + '">' + item + '</label>';
                    container.appendChild(div);
                }
            });
        }
    }

    // =========================================================================
    // 3. DISPLAY & NAVIGATION LOGIC
    // =========================================================================

    function toggleView(viewType) {
        var grid = document.getElementById('contentGrid');
        var table = document.getElementById('contentTable');
        var btnGrid = document.getElementById('btnGrid');
        var btnTable = document.getElementById('btnTable');

        if (viewType === 'grid') {
            if (grid) grid.style.removeProperty('display');
            if (table) table.style.display = 'none';
            if (btnGrid) btnGrid.classList.add('active');
            if (btnTable) btnTable.classList.remove('active');
        } else {
            if (grid) grid.style.display = 'none';
            if (table) table.style.display = 'block';
            if (btnGrid) btnGrid.classList.remove('active');
            if (btnTable) btnTable.classList.add('active');
        }
    }

    function showMainPage() {
        document.getElementById('mainPage').style.display = 'block';
        document.getElementById('adminPage').style.display = 'none';
        window.scrollTo(0, 0);
    }

    function showAdminPage() {
        if (!currentUser) return Swal.fire('Access Denied', 'กรุณาเข้าสู่ระบบ', 'error');

        document.getElementById('mainPage').style.display = 'none';
        document.getElementById('adminPage').style.display = 'block';

        var isAdmin = (currentUser.role === 'Admin');

        // Toggle Tabs Visibility
        var tabMasters = document.querySelector('button[data-bs-target="#tab-masters"]').parentElement;
        var tabGeneral = document.querySelector('button[data-bs-target="#tab-general"]').parentElement;

        if (isAdmin) {
            tabMasters.style.display = '';
            tabGeneral.style.display = '';
        } else {
            tabMasters.style.display = 'none';
            tabGeneral.style.display = 'none';
        }

        var btnAddUser = document.querySelector('#tab-users button[onclick="openAddUserModal()"]');
        if (btnAddUser) btnAddUser.style.display = isAdmin ? 'inline-block' : 'none';

        // Admin sees current paginated resources by default or could be enhanced to separate search
        renderAdminResourceTable(allData.resources);
        renderAdminUserTable();
        if (isAdmin) renderAdminMasters();

        window.scrollTo(0, 0);
    }

    function renderAdminResourceTable(data) {
        var c = document.getElementById('adminResourceTable'); if (!c) return;

        var displayData = data || [];
        if (currentUser && currentUser.role !== 'Admin') {
            displayData = displayData.filter(function (r) {
                return String(r.creator) === String(currentUser.id) || String(r.creator) === String(currentUser.username);
            });
        }

        if (displayData.length === 0) {
            c.innerHTML = '<div class="text-center text-muted py-4">ไม่พบข้อมูลในหน้านี้</div>';
            return;
        }

        var h = ['<table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th>ชื่อสื่อ</th><th>รายวิชา</th><th>ผู้สร้าง</th><th class="text-end">จัดการ</th></tr></thead><tbody>'];
        displayData.forEach(function (r) {
            h.push('<tr><td class="fw-bold">' + r.name + '</td><td>' + (r.subject || '-') + '</td><td><small>' + getUserName(r.creator) + '</small></td>' +
                '<td class="text-end"><button class="btn btn-sm btn-warning me-1" onclick="openEditResourceModal(\'' + r.id + '\')"><i class="fa fa-pencil"></i></button>' +
                '<button class="btn btn-sm btn-danger" onclick="deleteResource(\'' + r.id + '\')"><i class="fa fa-trash"></i></button></td></tr>');
        });
        h.push('</tbody></table>'); c.innerHTML = h.join('');
    }

    function renderAdminUserTable() {
        var c = document.getElementById('adminUserTable'); if (!c) return;
        var displayUsers = allData.users || [];
        var isAdmin = currentUser && currentUser.role === 'Admin';

        if (!isAdmin) {
            displayUsers = displayUsers.filter(function (u) { return String(u.username) === String(currentUser.username); });
        }

        var h = ['<table class="table table-bordered table-striped align-middle"><thead class="table-light"><tr><th>Username</th><th>ชื่อ</th><th>Role</th><th>จัดการ</th></tr></thead><tbody>'];
        displayUsers.forEach(function (u) {
            var allowDelete = isAdmin && u.username !== 'admin' && u.username !== currentUser.username;
            h.push('<tr><td>' + u.username + '</td><td>' + u.name + '</td><td>' + u.role + '</td>' +
                '<td><button class="btn btn-sm btn-warning me-1" onclick="openEditUserModal(\'' + u.username + '\')">แก้ไข</button>' +
                (allowDelete ? '<button class="btn btn-sm btn-danger" onclick="deleteUser(\'' + u.username + '\')">ลบ</button>' : '') + '</td></tr>');
        });
        h.push('</tbody></table>'); c.innerHTML = h.join('');
    }

    function renderAdminMasters() {
        ['Subjects', 'Grades', 'Types'].forEach(function (t) {
            var el = document.getElementById('admin' + t.slice(0, -1) + 'List'); if (!el) return;
            var list = t === 'Subjects' ? allData.subjects : t === 'Grades' ? allData.grades : allData.types;
            var h = list.map(function (i) {
                return '<li class="list-group-item d-flex justify-content-between bg-transparent">' + i + '<div><button class="btn btn-sm text-warning" onclick="editMaster(\'' + t + '\',\'' + i + '\')"><i class="fa fa-pencil"></i></button><button class="btn btn-sm text-danger" onclick="deleteMaster(\'' + t + '\',\'' + i + '\')"><i class="fa fa-times"></i></button></div></li>';
            }).join('');
            el.innerHTML = h || '<li class="list-group-item text-center">ไม่มีข้อมูล</li>';
        });
    }

    function updateDashboard() {
        var setTxt = function (id, txt) { var el = document.getElementById(id); if (el) el.innerText = txt; };

        // ใช้ค่าจาก Server-side stats
        var stats = allData.stats || {};

        setTxt('count-total', stats.totalResources || totalItems || 0);
        setTxt('count-creators', stats.uniqueCreators || 0);
        setTxt('count-subjects', stats.totalSubjects || 0);
        setTxt('count-types', stats.totalTypes || 0);
    }

    // =========================================================================
    // 4. RESOURCE RENDERING & PAGINATION (CORE LOGIC)
    // =========================================================================

    function renderResources(data) {
        var grid = document.getElementById('contentGrid');
        var table = document.getElementById('tableBody');
        var empty = document.getElementById('emptyState');
        if (!grid || !table) return;

        // Use passed data or global allData.resources
        var list = data || allData.resources || [];

        // Check Favorites
        var myFavorites = [];
        if (currentUser && allData.favorites) {
            var uid = String(currentUser.id || currentUser.username);
            myFavorites = allData.favorites.filter(function (f) {
                return String(f.userid) === uid;
            }).map(function (f) { return String(f.resourceid); });
        }

        var gridHTML = [], tableHTML = [];

        if (list.length === 0) {
            if (empty) empty.classList.remove('d-none');
        } else {
            if (empty) empty.classList.add('d-none');
            list.forEach(function (item) {
                var imgUrl = item.cover_id ? "https://lh3.googleusercontent.com/d/" + item.cover_id + "=w400" : IMG_PLACEHOLDER_COVER;
                var creatorDisplay = getUserName(item.creator);
                var viewCount = item.views || 0;

                var isFav = myFavorites.includes(String(item.id));
                var heartClass = isFav ? 'fa-solid text-danger' : 'fa-regular text-secondary';
                var favBtn = '<button class="btn btn-light btn-sm rounded-circle position-absolute top-0 end-0 m-2 shadow-sm" onclick="event.stopPropagation(); toggleFavorite(\'' + item.id + '\', this)" style="width:32px;height:32px;z-index:5;"><i class="' + heartClass + ' fa-heart"></i></button>';

                var cardHtml = '<div class="col-lg-3 col-md-4 col-sm-6"><div class="card h-100 resource-card shadow-sm" onclick="openViewModal(\'' + item.id + '\')">' + favBtn + '<img src="' + imgUrl + '" class="card-img-top" loading="lazy" onerror="this.src=\'' + IMG_PLACEHOLDER_COVER + '\'"><div class="card-body"><div class="d-flex justify-content-between mb-2"><span class="badge bg-primary bg-opacity-10 text-primary rounded-pill text-truncate" style="max-width: 50%">' + (item.subject || '-') + '</span><span class="badge bg-secondary bg-opacity-10 text-secondary rounded-pill text-truncate" style="max-width: 45%">' + (item.type || '-') + '</span></div><h6 class="card-title fw-bold text-truncate" title="' + item.name + '">' + item.name + '</h6><div class="small text-muted mb-2 text-truncate"><i class="fa fa-layer-group me-1"></i>' + (item.grade || '-') + '</div><div class="d-flex align-items-center mt-2 border-top pt-2"><i class="fa fa-user-circle me-1 text-muted"></i><small class="text-muted text-truncate w-100">' + creatorDisplay + '</small><small class="text-muted ms-auto d-flex align-items-center"><i class="fa fa-eye me-1"></i>' + viewCount + '</small></div></div></div></div>';
                gridHTML.push(cardHtml);

                var rowHtml = '<tr><td><img src="' + imgUrl + '" width="50" height="40" class="rounded object-fit-cover" onerror="this.src=\'' + IMG_PLACEHOLDER_THUMB + '\'"></td><td class="fw-bold text-primary cursor-pointer" onclick="openViewModal(\'' + item.id + '\')">' + item.name + '</td><td><span class="badge bg-light text-dark border">' + (item.subject || '-') + '</span></td><td>' + (item.grade || '-') + '</td><td>' + (item.type || '-') + '</td><td><small>' + creatorDisplay + '</small></td><td class="text-end"><button class="btn btn-sm btn-info text-white" onclick="openViewModal(\'' + item.id + '\')"><i class="fa fa-eye"></i> ' + viewCount + '</button></td></tr>';
                tableHTML.push(rowHtml);
            });
        }
        grid.innerHTML = gridHTML.join(''); table.innerHTML = tableHTML.join('');

        // Also update Admin table
        renderAdminResourceTable(list);

        // Render Pagination Controls
        renderPagination();
    }

    function renderPagination() {
        var nav = document.getElementById('paginationControls');
        var ul = document.getElementById('paginationList');
        var dispPage = document.getElementById('currentPageDisplay');
        var dispTotalPage = document.getElementById('totalPagesDisplay');
        var dispTotalItems = document.getElementById('totalItemsDisplay');

        if (totalItems <= 0) {
            if (nav) nav.style.display = 'none';
            return;
        }

        if (nav) nav.style.display = 'block';
        if (dispPage) dispPage.innerText = currentPage;
        if (dispTotalPage) dispTotalPage.innerText = totalPages;
        if (dispTotalItems) dispTotalItems.innerText = totalItems;

        if (!ul) return;
        ul.innerHTML = '';

        // Previous
        var liPrev = document.createElement('li');
        liPrev.className = 'page-item ' + (currentPage === 1 ? 'disabled' : '');
        liPrev.innerHTML = '<a class="page-link" href="#" onclick="event.preventDefault(); goToPage(' + (currentPage - 1) + ')">«</a>';
        ul.appendChild(liPrev);

        // Page Numbers (Show max 5 pages around current)
        var startPage = Math.max(1, currentPage - 2);
        var endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);

        if (startPage > 1) {
            ul.innerHTML += '<li class="page-item"><a class="page-link" href="#" onclick="event.preventDefault(); goToPage(1)">1</a></li>';
            if (startPage > 2) ul.innerHTML += '<li class="page-item disabled"><span class="page-link">...</span></li>';
        }

        for (var i = startPage; i <= endPage; i++) {
            var li = document.createElement('li');
            li.className = 'page-item ' + (i === currentPage ? 'active' : '');
            li.innerHTML = '<a class="page-link" href="#" onclick="event.preventDefault(); goToPage(' + i + ')">' + i + '</a>';
            ul.appendChild(li);
        }

        if (endPage < totalPages) {
            if (endPage < totalPages - 1) ul.innerHTML += '<li class="page-item disabled"><span class="page-link">...</span></li>';
            ul.innerHTML += '<li class="page-item"><a class="page-link" href="#" onclick="event.preventDefault(); goToPage(' + totalPages + ')">' + totalPages + '</a></li>';
        }

        // Next
        var liNext = document.createElement('li');
        liNext.className = 'page-item ' + (currentPage === totalPages ? 'disabled' : '');
        liNext.innerHTML = '<a class="page-link" href="#" onclick="event.preventDefault(); goToPage(' + (currentPage + 1) + ')">»</a>';
        ul.appendChild(liNext);
    }

    // [NEW] Fetch Data Function
    function fetchResources(page) {
        if (isFetching) return;
        isFetching = true;
        showLoader(true, "กำลังค้นหา...");

        // Get Filters
        var searchName = document.getElementById('searchName').value;
        var subject = document.getElementById('filterSubject').value;
        var grade = document.getElementById('filterGrade').value;
        var type = document.getElementById('filterType').value;
        var sort = document.getElementById('sortOrder').value;

        var onlyFavs = (sort === 'favorites');
        var myFavIds = [];

        // Handle Favorites filter (pass IDs to server)
        if (onlyFavs && currentUser && allData.favorites) {
            var uid = String(currentUser.id || currentUser.username);
            myFavIds = allData.favorites.filter(function (f) { return String(f.userid) === uid; }).map(function (f) { return String(f.resourceid); });
        }

        var params = {
            page: page,
            limit: itemsPerPage,
            search: searchName,
            subject: subject,
            grade: grade,
            type: type,
            sort: sort,
            onlyFavorites: onlyFavs,
            favorites: myFavIds
        };

        google.script.run
            .withSuccessHandler(function (res) {
                isFetching = false;
                showLoader(false);

                // Update State
                allData.resources = normalizeData(res.data);
                currentPage = res.pagination.page;
                totalPages = res.pagination.totalPages;
                totalItems = res.pagination.totalItems;

                // [NEW] Update Clear Button Visibility (just in case)
                toggleClearButtonState();

                renderResources();
            })
            .withFailureHandler(function (e) {
                isFetching = false;
                showLoader(false);
                Swal.fire('Error', 'ไม่สามารถดึงข้อมูลได้: ' + e, 'error');
            })
            .searchResources(params);
    }

    function goToPage(p) {
        if (p < 1 || p > totalPages) return;
        fetchResources(p);
    }

    // [NEW] Helper for Clear Button State
    function toggleClearButtonState() {
        var searchInput = document.getElementById('searchName');
        var btnClear = document.getElementById('btnClearSearch');
        if (searchInput && btnClear) {
            btnClear.style.display = searchInput.value.trim().length > 0 ? 'block' : 'none';
        }
    }

    // =========================================================================
    // 5. MAIN INITIALIZATION
    // =========================================================================

    function initializeUI() {
        populateDropdown('filterSubject', allData.subjects, true);
        populateDropdown('filterGrade', allData.grades, true);
        populateDropdown('filterType', allData.types, true);
        populateDropdown('formSubject', allData.subjects, false);
        populateDropdown('formType', allData.types, false);
        populateCheckboxes('formGrades', allData.grades, 'grades[]');
        populateDropdown('editResSubject', allData.subjects, false);
        populateDropdown('editResType', allData.types, false);
        populateCheckboxes('editResGrades', allData.grades, 'grades[]');

        var sortSelect = document.getElementById('sortOrder');
        if (sortSelect && !sortSelect.querySelector('option[value="favorites"]')) {
            var optFav = document.createElement('option');
            optFav.value = 'favorites';
            optFav.textContent = '⭐ รายการโปรด';
            sortSelect.appendChild(optFav);
        }

        var inputDrive = document.getElementById('settingDriveFolderId');
        if (inputDrive && allData.settings.DriveFolderId) inputDrive.value = allData.settings.DriveFolderId;

        // [NEW] Set Page Limit from Settings
        var inputLimit = document.getElementById('settingPageLimit');
        if (allData.settings.PageLimit) {
            itemsPerPage = parseInt(allData.settings.PageLimit);
            if (inputLimit) inputLimit.value = itemsPerPage;
        }

        updateDashboard();
        renderResources();
        renderAdminMasters();
        updateUserInterface();
    }

    function updateUserInterface() {
        var els = { login: document.getElementById('btnLoginNav'), profile: document.getElementById('userProfile'), admin: document.getElementById('adminMenu') };
        if (currentUser) {
            els.login.style.display = 'none'; els.profile.style.setProperty('display', 'flex', 'important');
            document.getElementById('userNameDisplay').innerText = currentUser.name || currentUser.username;
            document.getElementById('userRoleDisplay').innerText = currentUser.role;
            if (document.getElementById('userAvatar')) document.getElementById('userAvatar').src = currentUser.image || IMG_PLACEHOLDER_USER;
            els.admin.style.display = 'block';
        } else { els.login.style.display = 'block'; els.profile.style.setProperty('display', 'none', 'important'); els.admin.style.display = 'none'; }
    }

        setupDropzone('drop-zone-cover', 'inputCover', 'add', 'cover');

    function setupDropzone(zoneId, inputId, mode, type) {
        var zone = document.getElementById(zoneId);
        var input = document.getElementById(inputId);
        if (!zone || !input) return;

        zone.addEventListener('click', function () {
            if (type === 'cover') {
                var previewId = (mode === 'add') ? 'preview-cover' : 'preview-edit-cover';
                var hasFile = document.getElementById(previewId).children.length > 0;
                if (hasFile) return;
            }
            input.click();
        });

        zone.addEventListener('dragover', function (e) { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', function (e) { e.preventDefault(); zone.classList.remove('dragover'); });
        zone.addEventListener('drop', function (e) {
            e.preventDefault(); zone.classList.remove('dragover');
            handleFileSelection(e.dataTransfer.files, mode, type);
        });
        input.addEventListener('change', function (e) {
            handleFileSelection(e.target.files, mode, type);
            e.target.value = null;
        });
    }

    function updateCoverZoneUI(mode) {
        var zoneId = (mode === 'add') ? 'drop-zone-cover' : 'drop-zone-edit-cover';
        var previewId = (mode === 'add') ? 'preview-cover' : 'preview-edit-cover';
        var zone = document.getElementById(zoneId);
        var preview = document.getElementById(previewId);

        if (!zone || !preview) return;

        var hasFile = preview.children.length > 0;
        var icon = zone.querySelector('i');
        var text = zone.querySelector('p');

        if (hasFile) {
            if (icon) icon.style.display = 'none';
            if (text) text.style.display = 'none';
            zone.style.border = 'none';
            zone.style.backgroundColor = 'transparent';
            zone.classList.add('filled');
        } else {
            if (icon) icon.style.display = '';
            if (text) text.style.display = '';
            zone.style.border = '';
            zone.style.backgroundColor = '';
            zone.classList.remove('filled');
        }
    }

    function handleFileSelection(files, mode, type) {
        if (!files || files.length === 0) return;

        if (type === 'cover') {
            var previewId = (mode === 'add') ? 'preview-cover' : 'preview-edit-cover';
            if (document.getElementById(previewId).children.length > 0) {
                Swal.fire('แจ้งเตือน', 'กรุณาลบรูปปกเดิมออกก่อนอัปโหลดใหม่', 'warning');
                return;
            }
        }

        var targetState = (mode === 'add') ? addFormFiles : editFormFiles;
        var containerId = (mode === 'add') ? (type === 'cover' ? 'preview-cover' : 'preview-album') : (type === 'cover' ? 'preview-edit-cover' : 'preview-edit-album');

        for (var i = 0; i < files.length; i++) {
            var file = files[i];
            file.previewUrl = URL.createObjectURL(file);
            if (type === 'cover') targetState.cover = file;
            else targetState.album.push(file);
        }
        renderStagedPreviews(containerId, mode, type);
    }

    function renderStagedPreviews(containerId, mode, type) {
        var container = document.getElementById(containerId);
        if (!container) return;
        var targetState = (mode === 'add') ? addFormFiles : editFormFiles;
        var files = (type === 'cover') ? (targetState.cover ? [targetState.cover] : []) : targetState.album;
        var existingElements = container.querySelectorAll('.preview-item.existing-file');
        container.innerHTML = '';
        existingElements.forEach(function (el) { container.appendChild(el); });

        files.forEach(function (file, index) {
            var div = document.createElement('div');
            div.className = 'preview-item new-file';
            var content = '';
            if (file.type.startsWith('image/')) content = '<img src="' + file.previewUrl + '" class="object-fit-cover">';
            else if (file.type.startsWith('video/')) content = '<video src="' + file.previewUrl + '" controls class="object-fit-cover" style="width:100%; height:100%; background:#000;"></video>';
            else {
                var iconClass = getFileIcon(file.type, file.name);
                content = '<div class="d-flex align-items-center justify-content-center h-100 bg-light text-secondary"><i class="fa-solid ' + iconClass + ' fa-2x"></i></div>';
            }
            div.innerHTML = content + '<button type="button" class="remove-btn" onclick="event.stopPropagation(); removeStagedFile(\'' + mode + '\', \'' + type + '\', ' + index + ')"><i class="fa fa-times"></i></button><div class="file-name">' + file.name + '</div>';
            container.appendChild(div);
        });

        if (type === 'cover') updateCoverZoneUI(mode);
    }

    window.removeStagedFile = function (mode, type, index) {

        var containerId = (mode === 'add') ? (type === 'cover' ? 'preview-cover' : 'preview-album') : (type === 'cover' ? 'preview-edit-cover' : 'preview-edit-album');
        if (type === 'cover') targetState.cover = null; else targetState.album.splice(index, 1);

    function uploadFileResumable(file, accessToken, onProgress) {
        return new Promise(function (resolve, reject) {
            var contentType = file.type || 'application/octet-stream';
            var metadata = { name: file.name, mimeType: contentType };
            fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable', {
                method: 'POST', headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }, body: JSON.stringify(metadata)
            }).then(function (response) {
                if (!response.ok) throw new Error('Init upload failed'); return response.headers.get('Location');
            }).then(function (locationUrl) {
                var reader = new FileReader(); reader.readAsArrayBuffer(file);
                reader.onload = function (e) {
                    var xhr = new XMLHttpRequest(); xhr.open('PUT', locationUrl, true); xhr.setRequestHeader('Content-Type', contentType);
                    xhr.upload.onprogress = function (e) { if (e.lengthComputable) onProgress(Math.round((e.loaded / e.total) * 100)); };
                    xhr.onload = function () { if (xhr.status === 200 || xhr.status === 201) resolve(JSON.parse(xhr.responseText).id); else reject(new Error('Upload failed: ' + xhr.status)); };
                    xhr.onerror = function () { reject(new Error('Network error')); }; xhr.send(reader.result);
                };
            }).catch(function (error) { reject(error); });
        });
    }

    async function performUploadsAndSubmit(payload, fileList, submitFunc) {
        try {
            showLoader(true, "กำลังเชื่อมต่อ Google Drive...");
            var token = await new Promise(function (resolve, reject) { google.script.run.withSuccessHandler(resolve).withFailureHandler(reject).getAuthToken(); });
            var uploadedFiles = [];
            var totalFiles = fileList.length;
            for (var i = 0; i < totalFiles; i++) {
                var file = fileList[i];
                showLoader(true, 'กำลังอัปโหลดไฟล์ ' + (i + 1) + '/' + totalFiles + ': ' + file.name + ' (0%)');
                var fileId = await uploadFileResumable(file, token, function (percent) {
                    showLoader(true, 'กำลังอัปโหลดไฟล์ ' + (i + 1) + '/' + totalFiles + ': ' + file.name + ' (' + percent + '%)');
                });
                uploadedFiles.push({ id: fileId, name: file.name, type: file.type });
            }
            if (payload.isCover) { payload.coverFile = uploadedFiles[0]; }
            else { if (payload.hasCoverFile) payload.coverFile = uploadedFiles.shift(); payload.newAlbumFiles = uploadedFiles; }
            showLoader(true, "กำลังบันทึกข้อมูล..."); submitFunc(payload);
        } catch (e) { showLoader(false); console.error(e); Swal.fire('Upload Error', 'เกิดข้อผิดพลาดในการอัปโหลด: ' + e.message, 'error'); }
    }

    function getMediaContent(fileObj, isActive) {
        var fileId = fileObj.id;
        var mimeType = (fileObj.type || '').toLowerCase();
        var fileName = fileObj.name || 'File';
        var activeClass = isActive ? 'active' : '';

        var badgeHtml = '';
        if (mimeType.includes('pdf')) {
            badgeHtml = '<span class="media-info-badge bg-danger"><i class="fa-solid fa-file-pdf"></i> PDF</span>';
        } else if (mimeType.includes('image')) {
            badgeHtml = '<span class="media-info-badge bg-primary"><i class="fa-solid fa-image"></i> รูปภาพ</span>';
        } else if (mimeType.includes('video')) {
            badgeHtml = '<span class="media-info-badge bg-warning text-dark"><i class="fa-solid fa-video"></i> วิดีโอ</span>';
        } else if (mimeType.includes('word') || fileName.match(/\.doc/)) {
            badgeHtml = '<span class="media-info-badge bg-primary"><i class="fa-solid fa-file-word"></i> Word</span>';
        } else if (mimeType.includes('sheet') || mimeType.includes('excel') || fileName.match(/\.xls/)) {
            badgeHtml = '<span class="media-info-badge bg-success"><i class="fa-solid fa-file-excel"></i> Excel</span>';
        } else {
            badgeHtml = '<span class="media-info-badge bg-secondary"><i class="fa-solid fa-file"></i> ' + (fileName || 'File') + '</span>';
        }

        var driveLink = 'https://drive.google.com/file/d/' + fileId + '/view';
        var overlay = '<div class="media-overlay-group">' + badgeHtml + '<a href="' + driveLink + '" target="_blank" class="btn-popout" title="เปิดไฟล์เต็ม"><i class="fa-solid fa-arrow-up-right-from-square"></i></a></div>';

        var contentHtml = '';
        if (mimeType.includes('image')) {
            contentHtml = '<img src="https://lh3.googleusercontent.com/d/' + fileId + '" class="d-block w-100 h-100 object-fit-contain" onerror="handleMediaError(this, \'' + fileId + '\')">';
        } else {
            contentHtml = '<iframe src="https://drive.google.com/file/d/' + fileId + '/preview" class="d-block w-100 h-100 border-0" allow="autoplay"></iframe>';
        }

        return '<div class="carousel-item ' + activeClass + ' h-100"><div class="ratio ratio-16x9 h-100 d-flex align-items-center justify-content-center bg-dark position-relative">' + contentHtml + overlay + '</div></div>';
    }

    // Login/User/Settings Actions
    function openLoginModal() {
        document.getElementById('loginUsername').value = '';
        document.getElementById('loginPassword').value = '';
        new bootstrap.Modal(document.getElementById('loginModal')).show();
    }

    function submitLogin() {
        var u = document.getElementById('loginUsername').value, p = document.getElementById('loginPassword').value;
        if (!u || !p) return Swal.fire('แจ้งเตือน', 'กรอกข้อมูลให้ครบ', 'warning');
        showLoader(true);
        google.script.run.withSuccessHandler(function (res) {
            showLoader(false);
            if (res.status) {
                currentUser = res.user;
                var normUser = {}; Object.keys(currentUser).forEach(function (k) { normUser[k.toLowerCase()] = currentUser[k]; }); currentUser = normUser;
                localStorage.setItem(STORAGE_KEY_USER, JSON.stringify(currentUser));
                bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide(); updateUserInterface();
                Swal.fire({ icon: 'success', title: 'ยินดีต้อนรับ ' + (currentUser.name || currentUser.username), toast: true, position: 'top-end', showConfirmButton: false, timer: 2000 });
            } else Swal.fire('ผิดพลาด', res.message, 'error');
        }).loginUser(u, p);
    }

    function logout() { Swal.fire({ title: 'ออกจากระบบ?', icon: 'question', showCancelButton: true }).then(function (r) { if (r.isConfirmed) { currentUser = null; localStorage.removeItem(STORAGE_KEY_USER); updateUserInterface(); showMainPage(); } }); }

    function openAddUserModal() { document.getElementById('userForm').reset(); new bootstrap.Modal(document.getElementById('userModal')).show(); }
    function submitUser(e) {
        e.preventDefault();
        var data = { username: document.getElementById('userUsername').value, password: document.getElementById('userPassword').value, name: document.getElementById('userName').value, role: document.getElementById('userRole').value, image: document.getElementById('userImage').value };
        showLoader(true); google.script.run.withSuccessHandler(afterSubmit).addUser(data);
    }

    function openEditUserModal(username) {
        var user = (allData.users || []).find(function (u) { return u.username === username; });
        if (!user) return;
        document.getElementById('editUserOldUsername').value = user.username;
        document.getElementById('editUserUsername').value = user.username;
        document.getElementById('editUserPassword').value = user.password;
        document.getElementById('editUserName').value = user.name;
        document.getElementById('editUserImage').value = user.image;
        var roleSelect = document.getElementById('editUserRole');
        roleSelect.value = user.role;
        if (currentUser && currentUser.role !== 'Admin') { roleSelect.disabled = true; } else { roleSelect.disabled = false; }
        new bootstrap.Modal(document.getElementById('editUserModal')).show();
    }

    function submitEditUser(e) {
        e.preventDefault();
        var old = document.getElementById('editUserOldUsername').value;
        var roleSelect = document.getElementById('editUserRole');
        var data = {
            username: document.getElementById('editUserUsername').value,
            password: document.getElementById('editUserPassword').value,
            name: document.getElementById('editUserName').value,
            role: roleSelect.value,
            image: document.getElementById('editUserImage').value
        };
        showLoader(true); google.script.run.withSuccessHandler(afterSubmit).editUser(old, data);
    }

    function deleteUser(u) { Swal.fire({ title: 'ยืนยันลบ?', icon: 'warning', showCancelButton: true }).then(function (r) { if (r.isConfirmed) { showLoader(true); google.script.run.withSuccessHandler(afterSubmit).deleteUser(u); } }); }

    function submitSettings(e) {
        e.preventDefault();
        var form = document.getElementById('settingsForm');
        var data = {
            DriveFolderId: form.querySelector('[name="DriveFolderId"]').value,
            PageLimit: form.querySelector('[name="PageLimit"]').value
        };
        showLoader(true); google.script.run.withSuccessHandler(afterSubmit).saveGeneralSettings(data);
    }

    function addMaster(t, i) {
        var v = document.getElementById(i).value.trim(); if (v) {
            showLoader(true); google.script.run.withSuccessHandler(function (res) {
                if (res && res.data) afterSubmit(res); else loadAllData();
                document.getElementById(i).value = '';
            }).updateMasterData(t, 'add', v, null);
        }
    }

    function deleteMaster(t, v) {
        Swal.fire({
            title: 'ยืนยันการลบ?',
            text: "คุณต้องการลบข้อมูล '" + v + "' หรือไม่?",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'ลบ',
            cancelButtonText: 'ยกเลิก'
        }).then(function (result) {
            if (result.isConfirmed) {
                showLoader(true, "กำลังลบข้อมูล...");
                google.script.run.withSuccessHandler(function (res) {
                    if (res && res.data) afterSubmit(res);
                    else loadAllData();
                }).withFailureHandler(function (e) {
                    showLoader(false);
                    Swal.fire('Error', 'เกิดข้อผิดพลาด: ' + e, 'error');
                }).updateMasterData(t, 'delete', v, null);
            }
        });
    }

    async function editMaster(t, o) {
        const result = await Swal.fire({ title: 'แก้ไข', input: 'text', inputValue: o, showCancelButton: true });
        if (result.value && result.value !== o) {
            showLoader(true);
            google.script.run.withSuccessHandler(function (res) {
                if (res && res.data) afterSubmit(res); else loadAllData();
            }).updateMasterData(t, 'edit', o, result.value);
        }
    }
</script>
