<script>
    /**
     * SCRIPT.JS - Client Side Logic (API Version for GitHub Pages)
     * -------------------------------------------------------------------------
     * - เปลี่ยนจาก google.script.run เป็น fetch API ทั้งหมด
     * - เปลี่ยนระบบอัปโหลดไฟล์เป็นแบบ Base64 
     * -------------------------------------------------------------------------
     */

    // =========================================================================
    // 1. CONSTANTS & STATE
    // =========================================================================

    var STORAGE_KEY_USER = 'my_school_media_session';
    var IMG_PLACEHOLDER_COVER = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iMjAwIiB2aWV3Qm94PSIwIDAgNDAwIDIwMCI+PHJlY3Qgd2lkdGg9IjQwMCIgaGVpZ2h0PSIyMDAiIGZpbGw9IiNlOWVjZWYiLz48dGV4dCB4PSI1MCUiIHk9IjUwJSIgZm9udC1mYW1pbHk9InNhbnMtc2VyaWYiIGZvbnQtc2l6ZT0iMjAiIGZpbGw9IiM2Yzc1N2QiIGRvbWluYW50LWJhc2VsaW5lPSJtaWRkbGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiPk5vIENvdmVyPC90ZXh0Pjwvc3ZnPg==";
    var IMG_PLACEHOLDER_USER = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzNSIgaGVpZ2h0PSIzNSIgdmlld0JveD0iMCAwIDM1IDM1Ij48cmVjdCB3aWR0aD0iMzUiIGhlaWdodD0iMzUiIGZpbGw9IiNlOWVjZWYiLz48cGF0aCBkPSJNMTKr6EeffXNDX9kzYZyr5KsyfSB1v9GuZYx1IDQuNSA0LjVzLTIuMDE1IDQuNS00LjUgNC41LTQuNS0yLjAxNS00LjUtNC41IDIuMDE1LTQuNSA0LjUtNC41em0wIDljNC45NyAwIDkgNC4wMyA5IDl2MS41aC0xOHYtMS41YzAtNC45NyA0LjAzLTkgOS05eiIgZmlsbD0iIzZjNzU3ZCIvPjwvc3ZnPg==";
    var IMG_PLACEHOLDER_THUMB = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDUwIDQwIj48cmVjdCB3aWR0aD0iNTAiIGhlaWdodD0iNDAiIGZpbGw9IiNlOWVjZWYiLz48L3N2Zz4=";

    // 🔴 ใส่ URL ที่ได้จากการ Deploy ของ Google Apps Script ที่นี่ 🔴
    const API_URL = "https://script.google.com/macros/s/ใส่_ID_WEB_APP_ของครูที่นี่/exec";

    var allData = { resources: [], users: [], favorites: [], subjects: [], grades: [], types: [], settings: {} };
    var currentUser = null;
    var addFormFiles = { cover: null, album: [] };
    var editFormFiles = { cover: null, album: [] };
    var filesToDelete = { cover: false, album: [] };
    var currentPage = 1, totalPages = 1, totalItems = 0, itemsPerPage = 20;
    var isFetching = false;

    // =========================================================================
    // 2. CORE UTILITIES & API HELPER
    // =========================================================================

    // ฟังก์ชันช่วยยิง API ไปหา Google Apps Script
    function callBackend(action, payloadData, onSuccess, onFailure) {
        fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: action, ...payloadData })
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if(onSuccess) onSuccess(data);
        })
        .catch(function(err) {
            if(onFailure) onFailure(err);
            else { showLoader(false); Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้: ' + err, 'error'); }
        });
    }

    function showLoader(isLoading, text) {
        var loader = document.getElementById('loader-overlay');
        if (loader) {
            loader.style.display = isLoading ? 'flex' : 'none';
            var p = loader.querySelector('p');
            if (p) p.innerText = text || 'กำลังโหลดข้อมูล...';
        }
    }

    window.handleMediaError = function (imgElement, fileId) {
        imgElement.onerror = null; imgElement.style.display = 'none';
        var iframe = document.createElement('iframe');
        iframe.src = "https://drive.google.com/file/d/" + fileId + "/preview";
        iframe.className = "d-block w-100 h-100 border-0";
        iframe.setAttribute('allow', 'autoplay');
        imgElement.parentElement.appendChild(iframe);
    };

    function sanitizeId(str) { return String(str).replace(/[^a-zA-Z0-9ก-๙]/g, '_'); }

    function getUserName(userId) {
        if (!userId) return '-';
        var user = (allData.users || []).find(function (u) { return String(u.id) === String(userId) || String(u.username) === String(userId); });
        return user ? user.name : userId;
    }

    function normalizeData(arr) {
        if (!Array.isArray(arr)) return [];
        return arr.map(function (item) {
            var newItem = {};
            for (var key in item) newItem[key.toString().trim().toLowerCase().replace(/\s+/g, '_')] = item[key];
            return newItem;
        });
    }

    function getFileIcon(mimeType, fileName) {
        if (!mimeType) mimeType = '';
        if (mimeType.startsWith('image/')) return 'fa-image text-primary';
        if (mimeType.startsWith('video/')) return 'fa-file-video text-danger';
        if (mimeType === 'application/pdf') return 'fa-file-pdf text-danger';
        if (fileName && fileName.match(/\.(doc|docx)$/i)) return 'fa-file-word text-primary';
        if (fileName && fileName.match(/\.(xls|xlsx)$/i)) return 'fa-file-excel text-success';
        if (fileName && fileName.match(/\.(ppt|pptx)$/i)) return 'fa-file-powerpoint text-warning';
        return 'fa-file text-secondary';
    }

    function parseAlbumData(data) {
        if (!data) return [];
        try {
            var parsed = (typeof data === 'string' && (data.startsWith('[') || data.startsWith('{'))) ? JSON.parse(data) : data;
            if (Array.isArray(parsed)) {
                return parsed.map(function (item) {
                    if (typeof item === 'object' && item !== null && item.id) return item;
                    if (typeof item === 'string' && item.trim() !== "") return { id: item.trim(), type: 'image/jpeg', name: 'Legacy File' };
                    return null;
                }).filter(function (x) { return x !== null; });
            } else if (typeof data === 'string' && data.includes(',')) {
                return data.split(',').map(function (s) { return { id: s.trim(), type: 'image/jpeg', name: 'Legacy File' }; });
            }
            return [];
        } catch (e) { console.error("Parse Error:", e); return []; }
    }

    function populateDropdown(elementId, list, isFilter) {
        var select = document.getElementById(elementId);
        if (!select) return;
        select.innerHTML = isFilter ? '<option value="">ทั้งหมด</option>' : '<option value="" disabled selected>เลือก...</option>';
        if (list && Array.isArray(list)) {
            list.forEach(function (item) {
                if (item) {
                    var option = document.createElement('option');
                    option.value = item; option.textContent = item; select.appendChild(option);
                }
            });
        }
    }

    function populateCheckboxes(containerId, list, inputName) {
        var container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = '';
        if (list && Array.isArray(list)) {
            list.forEach(function (item) {
                if (item) {
                    var div = document.createElement('div'); div.className = 'form-check';
                    var id = containerId + '_chk_' + sanitizeId(item);
                    div.innerHTML = '<input class="form-check-input" type="checkbox" name="' + inputName + '" value="' + item + '" id="' + id + '"><label class="form-check-label" for="' + id + '">' + item + '</label>';
                    container.appendChild(div);
                }
            });
        }
    }

    // =========================================================================
    // 3. DISPLAY & NAVIGATION LOGIC
    // =========================================================================

    function toggleView(viewType) {
        var grid = document.getElementById('contentGrid'); var table = document.getElementById('contentTable');
        var btnGrid = document.getElementById('btnGrid'); var btnTable = document.getElementById('btnTable');
        if (viewType === 'grid') {
            if (grid) grid.style.removeProperty('display'); if (table) table.style.display = 'none';
            if (btnGrid) btnGrid.classList.add('active'); if (btnTable) btnTable.classList.remove('active');
        } else {
            if (grid) grid.style.display = 'none'; if (table) table.style.display = 'block';
            if (btnGrid) btnGrid.classList.remove('active'); if (btnTable) btnTable.classList.add('active');
        }
    }

    function showMainPage() { document.getElementById('mainPage').style.display = 'block'; document.getElementById('adminPage').style.display = 'none'; window.scrollTo(0, 0); }

    function showAdminPage() {
        if (!currentUser) return Swal.fire('Access Denied', 'กรุณาเข้าสู่ระบบ', 'error');
        document.getElementById('mainPage').style.display = 'none'; document.getElementById('adminPage').style.display = 'block';
        var isAdmin = (currentUser.role === 'Admin');
        var tabMasters = document.querySelector('button[data-bs-target="#tab-masters"]').parentElement;
        var tabGeneral = document.querySelector('button[data-bs-target="#tab-general"]').parentElement;
        tabMasters.style.display = isAdmin ? '' : 'none'; tabGeneral.style.display = isAdmin ? '' : 'none';
        var btnAddUser = document.querySelector('#tab-users button[onclick="openAddUserModal()"]');
        if (btnAddUser) btnAddUser.style.display = isAdmin ? 'inline-block' : 'none';

        renderAdminResourceTable(allData.resources); renderAdminUserTable();
        if (isAdmin) renderAdminMasters(); window.scrollTo(0, 0);
    }

    function renderAdminResourceTable(data) {
        var c = document.getElementById('adminResourceTable'); if (!c) return;
        var displayData = data || [];
        if (currentUser && currentUser.role !== 'Admin') {
            displayData = displayData.filter(function (r) { return String(r.creator) === String(currentUser.id) || String(r.creator) === String(currentUser.username); });
        }
        if (displayData.length === 0) { c.innerHTML = '<div class="text-center text-muted py-4">ไม่พบข้อมูลในหน้านี้</div>'; return; }

        var h = ['<table class="table table-hover align-middle mb-0"><thead class="table-light"><tr><th>ชื่อสื่อ</th><th>รายวิชา</th><th>ผู้สร้าง</th><th class="text-end">จัดการ</th></tr></thead><tbody>'];
        displayData.forEach(function (r) {
            h.push('<tr><td class="fw-bold">' + r.name + '</td><td>' + (r.subject || '-') + '</td><td><small>' + getUserName(r.creator) + '</small></td>' +
                '<td class="text-end"><button class="btn btn-sm btn-warning me-1" onclick="openEditResourceModal(\'' + r.id + '\')"><i class="fa fa-pencil"></i></button>' +
                '<button class="btn btn-sm btn-danger" onclick="deleteResource(\'' + r.id + '\')"><i class="fa fa-trash"></i></button></td></tr>');
        });
        h.push('</tbody></table>'); c.innerHTML = h.join('');
    }

    function renderAdminUserTable() {
        var c = document.getElementById('adminUserTable'); if (!c) return;
        var displayUsers = allData.users || []; var isAdmin = currentUser && currentUser.role === 'Admin';
        if (!isAdmin) displayUsers = displayUsers.filter(function (u) { return String(u.username) === String(currentUser.username); });

        var h = ['<table class="table table-bordered table-striped align-middle"><thead class="table-light"><tr><th>Username</th><th>ชื่อ</th><th>Role</th><th>จัดการ</th></tr></thead><tbody>'];
        displayUsers.forEach(function (u) {
            var allowDelete = isAdmin && u.username !== 'admin' && u.username !== currentUser.username;
            h.push('<tr><td>' + u.username + '</td><td>' + u.name + '</td><td>' + u.role + '</td>' +
                '<td><button class="btn btn-sm btn-warning me-1" onclick="openEditUserModal(\'' + u.username + '\')">แก้ไข</button>' +
                (allowDelete ? '<button class="btn btn-sm btn-danger" onclick="deleteUser(\'' + u.username + '\')">ลบ</button>' : '') + '</td></tr>');
        });
        h.push('</tbody></table>'); c.innerHTML = h.join('');
    }

    function renderAdminMasters() {
        ['Subjects', 'Grades', 'Types'].forEach(function (t) {
            var el = document.getElementById('admin' + t.slice(0, -1) + 'List'); if (!el) return;
            var list = t === 'Subjects' ? allData.subjects : t === 'Grades' ? allData.grades : allData.types;
            var h = list.map(function (i) {
                return '<li class="list-group-item d-flex justify-content-between bg-transparent">' + i + '<div><button class="btn btn-sm text-warning" onclick="editMaster(\'' + t + '\',\'' + i + '\')"><i class="fa fa-pencil"></i></button><button class="btn btn-sm text-danger" onclick="deleteMaster(\'' + t + '\',\'' + i + '\')"><i class="fa fa-times"></i></button></div></li>';
            }).join('');
            el.innerHTML = h || '<li class="list-group-item text-center">ไม่มีข้อมูล</li>';
        });
    }

    function updateDashboard() {
        var setTxt = function (id, txt) { var el = document.getElementById(id); if (el) el.innerText = txt; };
        var stats = allData.stats || {};
        setTxt('count-total', stats.totalResources || totalItems || 0); setTxt('count-creators', stats.uniqueCreators || 0);
        setTxt('count-subjects', stats.totalSubjects || 0); setTxt('count-types', stats.totalTypes || 0);
    }

    // =========================================================================
    // 4. RESOURCE RENDERING & PAGINATION (CORE LOGIC)
    // =========================================================================

    function renderResources(data) {
        var grid = document.getElementById('contentGrid'); var table = document.getElementById('tableBody'); var empty = document.getElementById('emptyState');
        if (!grid || !table) return;
        var list = data || allData.resources || [];
        var myFavorites = [];
        if (currentUser && allData.favorites) {
            var uid = String(currentUser.id || currentUser.username);
            myFavorites = allData.favorites.filter(function (f) { return String(f.userid) === uid; }).map(function (f) { return String(f.resourceid); });
        }

        var gridHTML = [], tableHTML = [];
        if (list.length === 0) { if (empty) empty.classList.remove('d-none'); } 
        else {
            if (empty) empty.classList.add('d-none');
            list.forEach(function (item) {
                var imgUrl = item.cover_id ? "https://lh3.googleusercontent.com/d/" + item.cover_id + "=w400" : IMG_PLACEHOLDER_COVER;
                var creatorDisplay = getUserName(item.creator); var viewCount = item.views || 0;
                var isFav = myFavorites.includes(String(item.id)); var heartClass = isFav ? 'fa-solid text-danger' : 'fa-regular text-secondary';
                var favBtn = '<button class="btn btn-light btn-sm rounded-circle position-absolute top-0 end-0 m-2 shadow-sm" onclick="event.stopPropagation(); toggleFavorite(\'' + item.id + '\', this)" style="width:32px;height:32px;z-index:5;"><i class="' + heartClass + ' fa-heart"></i></button>';

                gridHTML.push('<div class="col-lg-3 col-md-4 col-sm-6"><div class="card h-100 resource-card shadow-sm" onclick="openViewModal(\'' + item.id + '\')">' + favBtn + '<img src="' + imgUrl + '" class="card-img-top" loading="lazy" onerror="this.src=\'' + IMG_PLACEHOLDER_COVER + '\'"><div class="card-body"><div class="d-flex justify-content-between mb-2"><span class="badge bg-primary bg-opacity-10 text-primary rounded-pill text-truncate" style="max-width: 50%">' + (item.subject || '-') + '</span><span class="badge bg-secondary bg-opacity-10 text-secondary rounded-pill text-truncate" style="max-width: 45%">' + (item.type || '-') + '</span></div><h6 class="card-title fw-bold text-truncate" title="' + item.name + '">' + item.name + '</h6><div class="small text-muted mb-2 text-truncate"><i class="fa fa-layer-group me-1"></i>' + (item.grade || '-') + '</div><div class="d-flex align-items-center mt-2 border-top pt-2"><i class="fa fa-user-circle me-1 text-muted"></i><small class="text-muted text-truncate w-100">' + creatorDisplay + '</small><small class="text-muted ms-auto d-flex align-items-center"><i class="fa fa-eye me-1"></i>' + viewCount + '</small></div></div></div></div>');
                tableHTML.push('<tr><td><img src="' + imgUrl + '" width="50" height="40" class="rounded object-fit-cover" onerror="this.src=\'' + IMG_PLACEHOLDER_THUMB + '\'"></td><td class="fw-bold text-primary cursor-pointer" onclick="openViewModal(\'' + item.id + '\')">' + item.name + '</td><td><span class="badge bg-light text-dark border">' + (item.subject || '-') + '</span></td><td>' + (item.grade || '-') + '</td><td>' + (item.type || '-') + '</td><td><small>' + creatorDisplay + '</small></td><td class="text-end"><button class="btn btn-sm btn-info text-white" onclick="openViewModal(\'' + item.id + '\')"><i class="fa fa-eye"></i> ' + viewCount + '</button></td></tr>');
            });
        }
        grid.innerHTML = gridHTML.join(''); table.innerHTML = tableHTML.join('');
        renderAdminResourceTable(list); renderPagination();
    }

    function renderPagination() {
        var nav = document.getElementById('paginationControls'); var ul = document.getElementById('paginationList');
        if (totalItems <= 0) { if (nav) nav.style.display = 'none'; return; }
        if (nav) nav.style.display = 'block';
        document.getElementById('currentPageDisplay').innerText = currentPage; document.getElementById('totalPagesDisplay').innerText = totalPages; document.getElementById('totalItemsDisplay').innerText = totalItems;
        if (!ul) return; ul.innerHTML = '';
        ul.appendChild(Object.assign(document.createElement('li'), { className: 'page-item ' + (currentPage === 1 ? 'disabled' : ''), innerHTML: '<a class="page-link" href="#" onclick="event.preventDefault(); goToPage(' + (currentPage - 1) + ')">«</a>' }));
        var startPage = Math.max(1, currentPage - 2); var endPage = Math.min(totalPages, startPage + 4);
        if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);
        if (startPage > 1) { ul.innerHTML += '<li class="page-item"><a class="page-link" href="#" onclick="event.preventDefault(); goToPage(1)">1</a></li>'; if (startPage > 2) ul.innerHTML += '<li class="page-item disabled"><span class="page-link">...</span></li>'; }
        for (var i = startPage; i <= endPage; i++) {
            ul.appendChild(Object.assign(document.createElement('li'), { className: 'page-item ' + (i === currentPage ? 'active' : ''), innerHTML: '<a class="page-link" href="#" onclick="event.preventDefault(); goToPage(' + i + ')">' + i + '</a>' }));
        }
        if (endPage < totalPages) { if (endPage < totalPages - 1) ul.innerHTML += '<li class="page-item disabled"><span class="page-link">...</span></li>'; ul.innerHTML += '<li class="page-item"><a class="page-link" href="#" onclick="event.preventDefault(); goToPage(' + totalPages + ')">' + totalPages + '</a></li>'; }
        ul.appendChild(Object.assign(document.createElement('li'), { className: 'page-item ' + (currentPage === totalPages ? 'disabled' : ''), innerHTML: '<a class="page-link" href="#" onclick="event.preventDefault(); goToPage(' + (currentPage + 1) + ')">»</a>' }));
    }

    function fetchResources(page) {
        if (isFetching) return; isFetching = true; showLoader(true, "กำลังค้นหา...");
        var sort = document.getElementById('sortOrder').value; var onlyFavs = (sort === 'favorites'); var myFavIds = [];
        if (onlyFavs && currentUser && allData.favorites) {
            var uid = String(currentUser.id || currentUser.username);
            myFavIds = allData.favorites.filter(function (f) { return String(f.userid) === uid; }).map(function (f) { return String(f.resourceid); });
        }
        var params = {
            page: page, limit: itemsPerPage, search: document.getElementById('searchName').value,
            subject: document.getElementById('filterSubject').value, grade: document.getElementById('filterGrade').value,
            type: document.getElementById('filterType').value, sort: sort, onlyFavorites: onlyFavs, favorites: myFavIds
        };
        callBackend('searchResources', { params: params }, function(res) {
            isFetching = false; showLoader(false);
            allData.resources = normalizeData(res.data);
            currentPage = res.pagination.page; totalPages = res.pagination.totalPages; totalItems = res.pagination.totalItems;
            toggleClearButtonState(); renderResources();
        }, function(e) { isFetching = false; showLoader(false); Swal.fire('Error', 'ไม่สามารถดึงข้อมูลได้: ' + e, 'error'); });
    }

    function goToPage(p) { if (p < 1 || p > totalPages) return; fetchResources(p); }
    function toggleClearButtonState() { var i = document.getElementById('searchName'), b = document.getElementById('btnClearSearch'); if (i && b) b.style.display = i.value.trim().length > 0 ? 'block' : 'none'; }

    // =========================================================================
    // 5. MAIN INITIALIZATION
    // =========================================================================

    function initializeUI() {
        populateDropdown('filterSubject', allData.subjects, true); populateDropdown('filterGrade', allData.grades, true); populateDropdown('filterType', allData.types, true);
        populateDropdown('formSubject', allData.subjects, false); populateDropdown('formType', allData.types, false); populateCheckboxes('formGrades', allData.grades, 'grades[]');
        populateDropdown('editResSubject', allData.subjects, false); populateDropdown('editResType', allData.types, false); populateCheckboxes('editResGrades', allData.grades, 'grades[]');

        var sortSelect = document.getElementById('sortOrder');
        if (sortSelect && !sortSelect.querySelector('option[value="favorites"]')) {
            var optFav = document.createElement('option'); optFav.value = 'favorites'; optFav.textContent = '⭐ รายการโปรด'; sortSelect.appendChild(optFav);
        }
        var inputDrive = document.getElementById('settingDriveFolderId'); if (inputDrive && allData.settings.DriveFolderId) inputDrive.value = allData.settings.DriveFolderId;
        var inputLimit = document.getElementById('settingPageLimit'); if (allData.settings.PageLimit) { itemsPerPage = parseInt(allData.settings.PageLimit); if (inputLimit) inputLimit.value = itemsPerPage; }
        updateDashboard(); renderResources(); renderAdminMasters(); updateUserInterface();
    }

    function updateUserInterface() {
        var els = { login: document.getElementById('btnLoginNav'), profile: document.getElementById('userProfile'), admin: document.getElementById('adminMenu') };
        if (currentUser) {
            els.login.style.display = 'none'; els.profile.style.setProperty('display', 'flex', 'important');
            document.getElementById('userNameDisplay').innerText = currentUser.name || currentUser.username; document.getElementById('userRoleDisplay').innerText = currentUser.role;
            if (document.getElementById('userAvatar')) document.getElementById('userAvatar').src = currentUser.image || IMG_PLACEHOLDER_USER;
            els.admin.style.display = 'block';
        } else { els.login.style.display = 'block'; els.profile.style.setProperty('display', 'none', 'important'); els.admin.style.display = 'none'; }
    }

    function checkAutoLogin() { try { var stored = localStorage.getItem(STORAGE_KEY_USER); if (stored) { currentUser = JSON.parse(stored); updateUserInterface(); } } catch (e) { localStorage.removeItem(STORAGE_KEY_USER); } }

    function loadAllData() {
        showLoader(true);
        callBackend('getAllData', { params: { page: 1 } }, function (data) {
            if (!data) data = {};
            allData = {
                resources: normalizeData(data.resources), users: normalizeData(data.users), favorites: normalizeData(data.favorites),
                subjects: data.subjects || [], grades: data.grades || [], types: data.types || [], settings: data.settings || {}, stats: data.stats || {}
            };
            if (data.pagination) { currentPage = data.pagination.page; totalPages = data.pagination.totalPages; totalItems = data.pagination.totalItems; itemsPerPage = data.pagination.limit; }
            if (currentUser) { var validUser = allData.users.find(function (u) { return String(u.id) === String(currentUser.id) || String(u.username) === String(currentUser.username); }); if (validUser) { currentUser = validUser; localStorage.setItem(STORAGE_KEY_USER, JSON.stringify(currentUser)); } }
            initializeUI(); showLoader(false);
        });
    }

    function setupEventListeners() {
        var s = document.getElementById('searchName'), bs = document.getElementById('btnSearch'), bc = document.getElementById('btnClearSearch');
        if (s) { s.addEventListener('input', toggleClearButtonState); s.addEventListener('keydown', function (e) { if (e.key === 'Enter') { e.preventDefault(); fetchResources(1); } }); }
        if (bs) bs.addEventListener('click', function () { fetchResources(1); });
        if (bc) bc.addEventListener('click', function () { if (s) { s.value = ''; toggleClearButtonState(); fetchResources(1); } });

    function toggleFavorite(resourceId, btnElement) {
        if (!currentUser) return Swal.fire('แจ้งเตือน', 'กรุณาเข้าสู่ระบบเพื่อบันทึกรายการโปรด', 'warning');
        var icon = btnElement.querySelector('i'); var isCurrentlyFav = icon.classList.contains('fa-solid');
        icon.className = isCurrentlyFav ? 'fa-regular fa-heart text-secondary' : 'fa-solid fa-heart text-danger';

        callBackend('toggleFavorite', { userId: currentUser.id || currentUser.username, resourceId: resourceId }, function(res) {
            if (res.status) {
                allData.favorites = normalizeData(res.favorites);
                if (document.getElementById('sortOrder').value === 'favorites') fetchResources(currentPage); else renderResources();
            }
        });

    function setupDropzoneHandlers() {
        setupDropzone('drop-zone-cover', 'inputCover', 'add', 'cover'); setupDropzone('drop-zone-album', 'inputAlbum', 'add', 'album');
        setupDropzone('drop-zone-edit-cover', 'inputEditCover', 'edit', 'cover'); setupDropzone('drop-zone-edit-album', 'inputEditAlbum', 'edit', 'album');
    }

    function setupDropzone(zoneId, inputId, mode, type) {
        var zone = document.getElementById(zoneId); var input = document.getElementById(inputId); if (!zone || !input) return;
        zone.addEventListener('click', function () { if (type === 'cover' && document.getElementById(mode === 'add' ? 'preview-cover' : 'preview-edit-cover').children.length > 0) return; input.click(); });
        zone.addEventListener('dragover', function (e) { e.preventDefault(); zone.classList.add('dragover'); });
        zone.addEventListener('dragleave', function (e) { e.preventDefault(); zone.classList.remove('dragover'); });
        zone.addEventListener('drop', function (e) { e.preventDefault(); zone.classList.remove('dragover'); handleFileSelection(e.dataTransfer.files, mode, type); });
        input.addEventListener('change', function (e) { handleFileSelection(e.target.files, mode, type); e.target.value = null; });
    }

    function updateCoverZoneUI(mode) {
        var zone = document.getElementById(mode === 'add' ? 'drop-zone-cover' : 'drop-zone-edit-cover');
        var preview = document.getElementById(mode === 'add' ? 'preview-cover' : 'preview-edit-cover');
        if (!zone || !preview) return;
        var hasFile = preview.children.length > 0;
        var icon = zone.querySelector('i'), text = zone.querySelector('p');
        if (icon) icon.style.display = hasFile ? 'none' : ''; if (text) text.style.display = hasFile ? 'none' : '';
        zone.style.border = hasFile ? 'none' : ''; zone.style.backgroundColor = hasFile ? 'transparent' : '';
        hasFile ? zone.classList.add('filled') : zone.classList.remove('filled');
    }

    function handleFileSelection(files, mode, type) {
        if (!files || files.length === 0) return;
        if (type === 'cover' && document.getElementById(mode === 'add' ? 'preview-cover' : 'preview-edit-cover').children.length > 0) { return Swal.fire('แจ้งเตือน', 'กรุณาลบรูปปกเดิมออกก่อนอัปโหลดใหม่', 'warning'); }
        var targetState = mode === 'add' ? addFormFiles : editFormFiles;
        for (var i = 0; i < files.length; i++) { files[i].previewUrl = URL.createObjectURL(files[i]); if (type === 'cover') targetState.cover = files[i]; else targetState.album.push(files[i]); }
        renderStagedPreviews(mode === 'add' ? (type === 'cover' ? 'preview-cover' : 'preview-album') : (type === 'cover' ? 'preview-edit-cover' : 'preview-edit-album'), mode, type);
    }

    function renderStagedPreviews(containerId, mode, type) {
        var container = document.getElementById(containerId); if (!container) return;
        var targetState = mode === 'add' ? addFormFiles : editFormFiles; var files = type === 'cover' ? (targetState.cover ? [targetState.cover] : []) : targetState.album;
        var existingElements = container.querySelectorAll('.preview-item.existing-file'); container.innerHTML = ''; existingElements.forEach(function (el) { container.appendChild(el); });
        files.forEach(function (file, index) {
            var div = document.createElement('div'); div.className = 'preview-item new-file';
            var content = file.type.startsWith('image/') ? '<img src="' + file.previewUrl + '" class="object-fit-cover">' : (file.type.startsWith('video/') ? '<video src="' + file.previewUrl + '" controls class="object-fit-cover" style="width:100%; height:100%; background:#000;"></video>' : '<div class="d-flex align-items-center justify-content-center h-100 bg-light text-secondary"><i class="fa-solid ' + getFileIcon(file.type, file.name) + ' fa-2x"></i></div>');
            div.innerHTML = content + '<button type="button" class="remove-btn" onclick="event.stopPropagation(); removeStagedFile(\'' + mode + '\', \'' + type + '\', ' + index + ')"><i class="fa fa-times"></i></button><div class="file-name">' + file.name + '</div>'; container.appendChild(div);
        });
        if (type === 'cover') updateCoverZoneUI(mode);
    }

    window.removeStagedFile = function (mode, type, index) { var targetState = mode === 'add' ? addFormFiles : editFormFiles; if (type === 'cover') targetState.cover = null; else targetState.album.splice(index, 1); renderStagedPreviews(mode === 'add' ? (type === 'cover' ? 'preview-cover' : 'preview-album') : (type === 'cover' ? 'preview-edit-cover' : 'preview-edit-album'), mode, type); };
    window.removeExistingFile = function (btn, type, fileId) {
        var container = btn.closest('.upload-preview-grid'); var mode = container.id.includes('edit') ? 'edit' : 'add'; btn.closest('.preview-item').remove();
        if (type === 'cover') { filesToDelete.cover = true; updateCoverZoneUI(mode); } else if (type === 'album') filesToDelete.album.push(fileId);
    };

    function clearFormState(mode) {
        if (mode === 'add') { addFormFiles = { cover: null, album: [] }; document.getElementById('preview-cover').innerHTML = ''; document.getElementById('preview-album').innerHTML = ''; updateCoverZoneUI('add'); }
        else { editFormFiles = { cover: null, album: [] }; filesToDelete = { cover: false, album: [] }; document.getElementById('preview-edit-cover').innerHTML = ''; document.getElementById('preview-edit-album').innerHTML = ''; updateCoverZoneUI('edit'); }
    }

    // 🔴 [NEW] ฟังก์ชันช่วยแปลงไฟล์เป็น Base64
    function getBase64(file) {
        return new Promise(function (resolve, reject) {
            var reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = function () { resolve(reader.result); }; reader.onerror = function (error) { reject(error); };
        });
    }

    // 🔴 [NEW] อัปโหลดไฟล์แบบ Base64 ผ่าน API
    async function uploadFileViaAPI(file, subFolderName, onProgress) {
        onProgress(50); 
        var base64Data = await getBase64(file);
        var payload = { action: 'uploadFile', filename: file.name, mimeType: file.type || 'application/octet-stream', base64Data: base64Data, subFolderName: subFolderName || null };
        var response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        var result = await response.json();
        onProgress(100);
        if (result.status === true || result.id) { return result.data || result; } 
        else { throw new Error(result.message || "Upload Failed"); }
    }

    // 🔴 [NEW] จัดการคิวการอัปโหลดไฟล์
    async function performUploadsAndSubmit(payload, fileList, submitFunc) {
        try {
            showLoader(true, "กำลังเตรียมอัปโหลดไฟล์ผ่านระบบใหม่...");
            var uploadedFiles = []; var totalFiles = fileList.length;
            var albumFolderName = "Album_" + payload.name + "_" + new Date().getTime();
            
            for (var i = 0; i < totalFiles; i++) {
                var file = fileList[i];
                var isCoverImg = (payload.isCover) || (payload.hasCoverFile && i === 0);
                var targetFolder = isCoverImg ? null : albumFolderName; 
                
                var uploadResult = await uploadFileViaAPI(file, targetFolder, function (percent) {
                    showLoader(true, 'กำลังอัปโหลดไฟล์ ' + (i + 1) + '/' + totalFiles + ': ' + file.name + ' (' + percent + '%)');
                });
                uploadedFiles.push({ id: uploadResult.id, name: uploadResult.name, type: uploadResult.type });
            }
            if (payload.isCover) { payload.coverFile = uploadedFiles[0]; }
            else { if (payload.hasCoverFile) payload.coverFile = uploadedFiles.shift(); payload.newAlbumFiles = uploadedFiles; }
            
            showLoader(true, "กำลังบันทึกข้อมูล..."); submitFunc(payload);
        } catch (e) { showLoader(false); console.error(e); Swal.fire('Upload Error', 'เกิดข้อผิดพลาดในการอัปโหลด: ' + e.message, 'error'); }
    }

    function afterSubmit(res) {
        showLoader(false);
        if (res.status === true || res.status === 'success') {
            Swal.fire({ icon: 'success', title: 'สำเร็จ', showConfirmButton: false, timer: 1500 });
            var modal = document.querySelector('.modal.show'); if (modal) bootstrap.Modal.getInstance(modal).hide();
            if (res.data) {
                allData.users = normalizeData(res.data.users); allData.subjects = res.data.subjects || []; allData.grades = res.data.grades || []; allData.types = res.data.types || []; allData.stats = res.data.stats || {};
                fetchResources(currentPage); updateUserInterface(); renderAdminUserTable(); renderAdminMasters(); updateDashboard();
            } else fetchResources(currentPage);
        } else { Swal.fire('Error', res.message || 'เกิดข้อผิดพลาด', 'error'); }
    }

    function openAddModal() {
        if (!currentUser) return Swal.fire('แจ้งเตือน', 'กรุณาเข้าสู่ระบบ', 'warning').then(function (r) { if (r.isConfirmed) openLoginModal(); });

    function openEditResourceModal(id) {
        var item = (allData.resources || []).find(function (r) { return String(r.id) === String(id); });
        if (!item) return Swal.fire('Error', 'ไม่พบข้อมูลในรายการปัจจุบัน', 'error');

        document.getElementById('editResId').value = item.id; document.getElementById('editResCreator').value = item.creator; document.getElementById('editResName').value = item.name; document.getElementById('editResUrl').value = item.url; document.getElementById('editResSubject').value = item.subject; document.getElementById('editResType').value = item.type; document.getElementById('editResDesc').value = item.description;
        var gradesArr = (item.grade || '').split(',').map(function (s) { return s.trim(); }); document.querySelectorAll('#editResGrades input[type="checkbox"]').forEach(function (chk) { chk.checked = gradesArr.includes(chk.value); });
        if (item.cover_id) renderExistingPreviewDOM('preview-edit-cover', "https://lh3.googleusercontent.com/d/" + item.cover_id, item.cover_id, 'cover');
        var albumData = parseAlbumData(item.album_files || item.albumfiles || item[9]); if (albumData) { albumData.forEach(function (fileObj) { if (fileObj && fileObj.id) { renderExistingPreviewDOM('preview-edit-album', fileObj, fileObj.id, 'album'); } }); }
        new bootstrap.Modal(document.getElementById('editResourceModal')).show();

    function renderExistingPreviewDOM(containerId, fileOrUrl, id, type) {
        var container = document.getElementById(containerId); var div = document.createElement('div'); div.className = 'preview-item existing-file';
        var fileId, imgSrc, fileName;
        if (typeof fileOrUrl === 'object') { fileId = fileOrUrl.id; fileName = fileOrUrl.name || 'File'; imgSrc = (fileOrUrl.type && fileOrUrl.type.startsWith('image/')) ? 'https://lh3.googleusercontent.com/d/' + fileId : null; } 
        else { fileId = id; imgSrc = fileOrUrl; fileName = 'เดิม'; }
        var content = imgSrc ? '<img src="' + imgSrc + '" class="object-fit-cover" onerror="this.src=\'' + IMG_PLACEHOLDER_THUMB + '\'">' : '<div class="d-flex align-items-center justify-content-center h-100 bg-light text-secondary"><i class="fa-solid fa-file fa-2x"></i></div>';
        div.innerHTML = content + '<button type="button" class="remove-btn" onclick="event.stopPropagation(); removeExistingFile(this, \'' + (type || 'album') + '\', \'' + fileId + '\')"><i class="fa fa-times"></i></button><div class="file-name">' + fileName + '</div>';
        container.appendChild(div); if (type === 'cover') updateCoverZoneUI(containerId.includes('edit') ? 'edit' : 'add');
    }

    function submitResource(e) {
        e.preventDefault();
        var checkboxes = document.querySelectorAll('#formGrades input:checked'); if (checkboxes.length === 0) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกระดับชั้น', 'warning');
        var form = document.getElementById('resourceForm');
        var payload = { name: form.querySelector('[name="name"]').value, url: form.querySelector('[name="url"]').value, subject: document.getElementById('formSubject').value, type: document.getElementById('formType').value, grades: Array.from(checkboxes).map(function (cb) { return cb.value; }), description: form.querySelector('[name="description"]').value, creator: document.getElementById('formCreator').value, hasCoverFile: !!addFormFiles.cover };
        var filesToUpload = []; if (addFormFiles.cover) filesToUpload.push(addFormFiles.cover); if (addFormFiles.album.length > 0) filesToUpload = filesToUpload.concat(addFormFiles.album);
        if (filesToUpload.length > 0) {
            performUploadsAndSubmit(payload, filesToUpload, function (finalPayload) {
                if (finalPayload.hasCoverFile && !finalPayload.newAlbumFiles) finalPayload.albumFiles = []; else finalPayload.albumFiles = finalPayload.newAlbumFiles || [];
                callBackend('saveResource', { payload: finalPayload }, afterSubmit);
            });
        } else { payload.albumFiles = []; showLoader(true); callBackend('saveResource', { payload: payload }, afterSubmit); }
    }

    function submitEditResource(e) {
        e.preventDefault();
        var checkboxes = document.querySelectorAll('#editResGrades input:checked'); if (checkboxes.length === 0) return Swal.fire('แจ้งเตือน', 'กรุณาเลือกระดับชั้น', 'warning');
        var payload = { id: document.getElementById('editResId').value, name: document.getElementById('editResName').value, url: document.getElementById('editResUrl').value, subject: document.getElementById('editResSubject').value, type: document.getElementById('editResType').value, grades: Array.from(checkboxes).map(function (cb) { return cb.value; }), description: document.getElementById('editResDesc').value, deleteCover: filesToDelete.cover, deletedAlbumFiles: filesToDelete.album, hasCoverFile: !!editFormFiles.cover };
        var filesToUpload = []; if (editFormFiles.cover) filesToUpload.push(editFormFiles.cover); if (editFormFiles.album.length > 0) filesToUpload = filesToUpload.concat(editFormFiles.album);
        if (filesToUpload.length > 0) {
            performUploadsAndSubmit(payload, filesToUpload, function (finalPayload) { callBackend('editResource', { payload: finalPayload }, afterSubmit); });

    function openViewModal(id) {
        var item = (allData.resources || []).find(function (r) { return String(r.id) === String(id); }); if (!item) return;
        var setTxt = function (eid, val) { var el = document.getElementById(eid); if (el) el.innerText = val || '-'; };
        setTxt('viewTitle', item.name); setTxt('viewBadge', item.subject); setTxt('viewType', item.type); setTxt('viewGrade', item.grade); setTxt('viewCreator', getUserName(item.creator)); setTxt('viewDesc', item.description);
        var btnLink = document.getElementById('viewLink'), targetUrl = "#";
        if (item.url && item.url !== "" && item.url !== "#") targetUrl = item.url; else if (item.album_folder_id && item.album_folder_id.trim() !== "") targetUrl = "https://drive.google.com/drive/folders/" + item.album_folder_id; else if (item.cover_id && item.cover_id.trim() !== "") targetUrl = "https://drive.google.com/file/d/" + item.cover_id + "/view";
        btnLink.href = targetUrl; targetUrl === "#" ? (btnLink.classList.add('disabled'), btnLink.innerHTML = '<i class="fa-solid fa-ban me-2"></i> ไม่มีไฟล์แนบ') : (btnLink.classList.remove('disabled'), btnLink.innerHTML = '<i class="fa-solid fa-external-link-alt me-2"></i> เปิดดูสื่อฉบับเต็ม');
        var inner = document.getElementById('carouselInner');
        if (inner) {
            inner.innerHTML = '';

            var albumData = parseAlbumData(item.album_files || item.albumfiles || item[9]); albumData.forEach(function (fileObj, index) { if (fileObj && fileObj.id) { inner.innerHTML += getMediaContent(fileObj, (!item.cover_id && index === 0)); } });
        }
        new bootstrap.Modal(document.getElementById('viewModal')).show(); callBackend('incrementView', { id: id });
    }

    function getMediaContent(fileObj, isActive) {
        var fileId = fileObj.id; var mimeType = (fileObj.type || '').toLowerCase(); var fileName = fileObj.name || 'File';
        var badgeHtml = mimeType.includes('pdf') ? '<span class="media-info-badge bg-danger"><i class="fa-solid fa-file-pdf"></i> PDF</span>' : (mimeType.includes('image') ? '<span class="media-info-badge bg-primary"><i class="fa-solid fa-image"></i> รูปภาพ</span>' : (mimeType.includes('video') ? '<span class="media-info-badge bg-warning text-dark"><i class="fa-solid fa-video"></i> วิดีโอ</span>' : ((mimeType.includes('word') || fileName.match(/\.doc/)) ? '<span class="media-info-badge bg-primary"><i class="fa-solid fa-file-word"></i> Word</span>' : ((mimeType.includes('sheet') || mimeType.includes('excel') || fileName.match(/\.xls/)) ? '<span class="media-info-badge bg-success"><i class="fa-solid fa-file-excel"></i> Excel</span>' : '<span class="media-info-badge bg-secondary"><i class="fa-solid fa-file"></i> ' + (fileName || 'File') + '</span>'))));
        var contentHtml = mimeType.includes('image') ? '<img src="https://lh3.googleusercontent.com/d/' + fileId + '" class="d-block w-100 h-100 object-fit-contain" onerror="handleMediaError(this, \'' + fileId + '\')">' : '<iframe src="https://drive.google.com/file/d/' + fileId + '/preview" class="d-block w-100 h-100 border-0" allow="autoplay"></iframe>';
        return '<div class="carousel-item ' + (isActive ? 'active' : '') + ' h-100"><div class="ratio ratio-16x9 h-100 d-flex align-items-center justify-content-center bg-dark position-relative">' + contentHtml + '<div class="media-overlay-group">' + badgeHtml + '<a href="https://drive.google.com/file/d/' + fileId + '/view" target="_blank" class="btn-popout" title="เปิดไฟล์เต็ม"><i class="fa-solid fa-arrow-up-right-from-square"></i></a></div></div></div>';
    }
